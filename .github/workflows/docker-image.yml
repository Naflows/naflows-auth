name: Docker Compose CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      MONGO_INITDB_ROOT_USERNAME: ${{ secrets.MONGO_INITDB_ROOT_USERNAME }}
      MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
      MONGO_URL: ${{ secrets.MONGO_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          echo "MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}" >> .env
          echo "MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}" >> .env
          echo "MONGO_URL=${MONGO_URL}" >> .env

      - name: Build and Start containers
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API..."
            sleep 1
          done

      - name: Show running containers
        run: docker ps -a
      
      - name: Show logs of naflows-auth-auth-api-1
        run: docker logs naflows-auth-auth-api-1

      - name: Run basic health check
        run: |
          curl -f http://0.0.0.0:3000 || exit 1
          curl -f http://0.0.0.0:8081 || exit 1

      - name: Stop containers
        run: docker compose -f docker-compose.yml down
